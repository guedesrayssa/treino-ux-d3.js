<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ice Cream Maker</title>
    <style>
        /* estilinho simples só pra centralizar e deixar mais bonito */
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #ffbccc, #ff5593);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #f9f9ff;
        }

        .cartao-sorvete {
            background: #ffffff;
            color: #ff0022;
            padding: 20px 28px 28px;
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .cartao-sorvete h1 {
            margin: 0;
            font-size: 20px;
            letter-spacing: 1px;
            text-transform: lowercase;
        }

        .cartao-sorvete p {
            margin: 0;
            font-size: 12px;
            color: #555;
        }

        .cartao-sorvete svg {
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="cartao-sorvete">
        <h1>ice cream maker by ray</h1>
        <p>clique nas bolinhas de sorvete, na casquinha e no tubinho para fazer seu sorvetinho favorito :)</p>

        <script src="https://d3js.org/d3.v7.min.js"></script>
        
        <script>
        const largura = 300;
        const altura = 350;

        const svg = d3.select(".cartao-sorvete")
            .append("svg")
            .attr("width", largura)
            .attr("height", altura);

        const centroX = largura / 2;
        const topoConeY = 150;

        const caminhoCone = d3.path();
        caminhoCone.moveTo(centroX - 70, topoConeY);
        caminhoCone.lineTo(centroX + 70, topoConeY);
        caminhoCone.lineTo(centroX, altura - 10);
        caminhoCone.closePath();

        // cores clicáveis pro cone e pro tubinho
        const coresCone = [
            "#f4a261", "#ffc98b", "#f0a37a", "#e9a86f", "#d98c5f",
            "#f6b48b", "#f2a45a"
        ];
        const coresTubinho = [
            "#b56539", "#8d4b2a", "#d6894c", "#6b3b1f", "#c47a4a",
            "#9c5a33", "#e09a63"
        ];
        const marromBorda = "#5a310f";

        let indiceCone = 0;
        let indiceTubinho = 0;

        const conePath = svg.append("path")
            .attr("d", caminhoCone.toString())
            .attr("fill", coresCone[indiceCone])
            .attr("stroke", marromBorda)
            .attr("stroke-width", 6)
            .attr("stroke-linejoin", "round")
            .style("cursor", "pointer");

        const defs = svg.append("defs");

        defs.append("clipPath")
            .attr("id", "clip-cone")
            .append("path")
            .attr("d", caminhoCone.toString());

        const texturaGrupo = svg.append("g")
            .attr("clip-path", "url(#clip-cone)");

        const linhas = d3.range(-4, 8);

        linhas.forEach(i => {
            texturaGrupo.append("line")
                .attr("class", "linha-casquinha")
                .attr("x1", centroX - 90 + i * 25)
                .attr("y1", topoConeY + 5)
                .attr("x2", centroX + i * 25)
                .attr("y2", altura)
                .attr("stroke", marromBorda)
                .attr("stroke-width", 4);

            texturaGrupo.append("line")
                .attr("class", "linha-casquinha")
                .attr("x1", centroX + 90 - i * 25)
                .attr("y1", topoConeY + 5)
                .attr("x2", centroX - i * 25)
                .attr("y2", altura)
                .attr("stroke", marromBorda)
                .attr("stroke-width", 4);
        });

        conePath.on("click", function () {
            indiceCone = (indiceCone + 1) % coresCone.length;
            conePath.attr("fill", coresCone[indiceCone]);
        });

        const tubinho = svg.append("rect")
            .attr("x", centroX + 40)
            .attr("y", topoConeY - 150)
            .attr("width", 26)
            .attr("height", 140)
            .attr("rx", 6)
            .attr("transform", `rotate(30, ${centroX + 53}, ${topoConeY - 80})`)
            .attr("fill", coresTubinho[indiceTubinho])
            .attr("stroke", marromBorda)
            .attr("stroke-width", 4)
            .style("cursor", "pointer");

        d3.range(0, 6).forEach(i => {
            svg.append("rect")
                .attr("class", "faixa-tubinho")
                .attr("x", centroX + 40)
                .attr("y", topoConeY - 150 + i * 22)
                .attr("width", 26)
                .attr("height", 10)
                .attr("rx", 4)
                .attr("transform", `rotate(30, ${centroX + 53}, ${topoConeY - 80})`)
                .attr("fill", "#e3a66b")
                .attr("opacity", 0.9);
        });

        tubinho.on("click", function () {
            indiceTubinho = (indiceTubinho + 1) % coresTubinho.length;
            tubinho.attr("fill", coresTubinho[indiceTubinho]);
        });

        const bolas = [
            { cx: centroX - 55, cy: topoConeY - 32, cor: "#b7b3ff" }, // bola 1
            { cx: centroX + 55, cy: topoConeY - 32, cor: "#d4ffc4" }, // bola 2clarinha
            { cx: centroX,      cy: topoConeY - 78, cor: "#ffe2b5" }  // bola 3 em cima
        ];

        const grupoBolas = svg.append("g");

        const coresExtras = [
            "#ffadad", "#ffd6a5", "#fdffb6", "#caffbf", "#9bf6ff", "#bdb2ff",
            "#ffc6ff", "#ffd1dc", "#ffe4e1", "#f4a4a4"
        ];
        const coresBordaSorvete = [
            "#e07b7b", "#e0aa5d", "#e0dd73", "#9ad29b", "#6fb1d9", "#9387d9",
            "#e19be8", "#e09aa9", "#e0b4b0", "#d26b6b"
        ];
        const coresGranuladoSorvete = [
            "#b14e4e", "#b37826", "#b3a63a", "#598b59", "#3f6f99", "#5a4ea5",
            "#b063b5", "#b05b70", "#b07672", "#953c3c"
        ];

        const bolasSel = grupoBolas.selectAll("circle")
            .data(bolas)
            .enter()
            .append("circle")
            .attr("cx", d => d.cx)
            .attr("cy", d => d.cy)
            .attr("r", 55)
            .attr("fill", d => d.cor)
            .attr("stroke", marromBorda)
            .attr("stroke-width", 5)
            .each(function (d, i) {
                d.indiceCor = 0;
                d.bolaIndex = i;
            })
            .on("click", function (event, d) {
                d.indiceCor = (d.indiceCor + 1) % coresExtras.length;
                const novaCorSorvete = coresExtras[d.indiceCor];
                const novaCorBorda = coresBordaSorvete[d.indiceCor];
                const novaCorGranulado = coresGranuladoSorvete[d.indiceCor];

                d3.select(this)
                    .attr("fill", novaCorSorvete)
                    .attr("stroke", marromBorda);

                granuladosSel
                    .filter(g => g.bolaIndex === d.bolaIndex)
                    .attr("fill", marromBorda);
            });

        const gotasDados = [];
        const raioBola = 55;
        const raioGran = 4;
        const qtdPorBola = 6; // menos granulados pra ficarem mais afastados

        // aqui eu deixo os granulados bem dentro da bola
        // sem entrar na área de outra bola e sem se encostar
        bolas.forEach((bola, indexBola) => {
            const internos = [];

            d3.range(qtdPorBola).forEach(() => {
                let ok = false;
                let tentativa = 0;

                while (!ok && tentativa < 120) {
                    const ang = Math.random() * Math.PI * 2;
                    const raio = 12 + Math.random() * 24;

                    const cx = bola.cx + Math.cos(ang) * raio;
                    const cy = bola.cy + Math.sin(ang) * raio;

                    // fica dentro da própria bola com folga pra borda
                    const distCentro = Math.hypot(cx - bola.cx, cy - bola.cy);
                    if (distCentro + raioGran > raioBola - 4) {
                        tentativa++;
                        continue;
                    }

                    // não entra na área das outras bolas
                    let dentroOutra = false;
                    bolas.forEach((outra, j) => {
                        if (j === indexBola) return;
                        const distOutra = Math.hypot(cx - outra.cx, cy - outra.cy);
                        if (distOutra < raioBola - 6) {
                            dentroOutra = true;
                        }
                    });
                    if (dentroOutra) {
                        tentativa++;
                        continue;
                    }

                    // não fica em cima de outro granulado da mesma bola (aumento um pouco a distância)
                    const encosta = internos.some(p => {
                        const dist = Math.hypot(cx - p.cx, cy - p.cy);
                        return dist < raioGran * 2.6;
                    });
                    if (encosta) {
                        tentativa++;
                        continue;
                    }

                    ok = true;
                    const ponto = { cx, cy, bolaIndex: indexBola };
                    internos.push(ponto);
                    gotasDados.push(ponto);
                }
            });
        });

        const granuladosSel = svg.selectAll("gotinhas-chocolate")
            .data(gotasDados)
            .enter()
            .append("circle")
            .attr("cx", d => d.cx)
            .attr("cy", d => d.cy)
            .attr("r", 4)
            .attr("fill", marromBorda);

        const cerejaX = centroX + 20;
        const cerejaY = topoConeY - 115;

        svg.append("ellipse")
            .attr("cx", cerejaX + 25)
            .attr("cy", cerejaY - 15)
            .attr("rx", 18)
            .attr("ry", 10)
            .attr("fill", "#6abf69")
            .attr("stroke", marromBorda)
            .attr("stroke-width", 3);

        const caminhoCabo = d3.path();
        caminhoCabo.moveTo(cerejaX, cerejaY - 15);
        caminhoCabo.quadraticCurveTo(
            cerejaX - 10, cerejaY - 45,
            cerejaX + 5, cerejaY - 65
        );

        svg.append("path")
            .attr("d", caminhoCabo.toString())
            .attr("fill", "none")
            .attr("stroke", marromBorda)
            .attr("stroke-width", 4)
            .attr("stroke-linecap", "round");

        svg.append("circle")
            .attr("cx", cerejaX)
            .attr("cy", cerejaY)
            .attr("r", 18)
            .attr("fill", "#ff4b5c")
            .attr("stroke", marromBorda)
            .attr("stroke-width", 4);
        </script>
    </div>
</body>
</html>
